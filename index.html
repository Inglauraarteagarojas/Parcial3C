<head>

<title>Examen POO - Cohete 3D</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#0a0e1a;--card:#111827;--card2:#1a2235;--border:#1e3058;--text:#e8edf5;--muted:#6b7fa3;--green:#22c55e;--red:#ef4444;--blue:#3b82f6;--amber:#f59e0b;--purple:#a855f7;}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
.reg-overlay{position:fixed;inset:0;background:rgba(4,8,20,.95);z-index:999;display:flex;align-items:center;justify-content:center;}.reg-overlay.hide{display:none;}
.reg-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2.2rem 2rem;width:380px;max-width:92vw;}
.reg-box h2{font-size:1.2rem;margin-bottom:.3rem;background:linear-gradient(90deg,#ff6644,var(--amber));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.reg-box p{font-size:.74rem;color:var(--muted);margin-bottom:1.2rem;}
.reg-box label{display:block;font-size:.72rem;color:var(--muted);margin-bottom:.2rem;margin-top:.7rem;}
.reg-box input{width:100%;padding:.55rem .75rem;background:var(--card2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.82rem;outline:none;}
.reg-box input:focus{border-color:var(--blue);}
.reg-box .err{color:var(--red);font-size:.68rem;margin-top:.2rem;min-height:1rem;}
.reg-btn{margin-top:1.1rem;width:100%;padding:.6rem;background:linear-gradient(135deg,#ff6644,var(--amber));border:none;border-radius:8px;color:#fff;font-weight:700;font-size:.88rem;cursor:pointer;}
.wrap{display:grid;grid-template-columns:1fr 240px;height:100vh;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.ecol{padding:1.1rem 1.3rem;overflow-y:auto;max-height:100vh;background:var(--bg);}
.prog-row{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:.3rem;}
.prog-bg{background:var(--card2);border-radius:99px;height:4px;margin-bottom:1rem;}
.prog-fill{height:4px;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .4s;}
.tag{display:inline-block;font-size:.65rem;font-weight:700;padding:2px 9px;border-radius:99px;margin-bottom:.5rem;text-transform:uppercase;}
.t1{background:rgba(34,197,94,.15);color:#4ade80;}.t2{background:rgba(59,130,246,.15);color:#60a5fa;}.t3{background:rgba(245,158,11,.15);color:#fbbf24;}.t4{background:rgba(168,85,247,.15);color:#c084fc;}.t5{background:rgba(239,68,68,.15);color:#f87171;}.t6{background:rgba(236,72,153,.15);color:#f472b6;}
.qcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:.75rem;}
.qnum{font-size:.68rem;color:var(--muted);margin-bottom:.2rem;}
.qtxt{font-size:.84rem;font-weight:500;line-height:1.55;margin-bottom:.75rem;}
pre{font-family:'Cascadia Code',monospace;font-size:.72rem;background:#080e1e;border:1px solid var(--border);border-radius:6px;padding:.55rem .8rem;overflow-x:auto;line-height:1.5;margin-bottom:.75rem;color:#93c5fd;white-space:pre;}
.opts{display:flex;flex-direction:column;gap:6px;}
.obtn{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:.65rem .8rem;text-align:left;cursor:pointer;font-size:.82rem;color:var(--text);transition:.15s;width:100%;line-height:1.4;min-height:48px;}
.obtn:hover:not(:disabled){border-color:var(--blue);background:rgba(59,130,246,.08);}
.obtn.correct{background:rgba(34,197,94,.12);border-color:var(--green);color:#4ade80;}
.obtn.wrong{background:rgba(239,68,68,.12);border-color:var(--red);color:#f87171;}
.obtn:disabled{cursor:default;}
.expl{display:none;margin-top:.55rem;padding:.55rem .8rem;background:rgba(34,197,94,.07);border-left:3px solid var(--green);border-radius:0 5px 5px 0;font-size:.74rem;color:#86efac;line-height:1.5;}.expl.show{display:block;}
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:.75rem;}
.nbtn{background:var(--card2);border:1px solid var(--border);border-radius:7px;padding:.5rem .9rem;font-size:.82rem;cursor:pointer;color:var(--text);min-height:44px;}
.nbtn.pri{background:var(--blue);border-color:#1d4ed8;color:#fff;font-weight:600;}.nbtn:disabled{opacity:.3;cursor:default;}
.ninfo{font-size:.68rem;color:var(--muted);}
.fnum{font-size:2.6rem;font-weight:700;text-align:center;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.fsub{font-size:.75rem;color:var(--muted);text-align:center;margin:.3rem 0 .6rem;}
.fbadge{display:inline-block;padding:.3rem .9rem;border-radius:99px;font-size:.75rem;font-weight:700;}
.fa{background:rgba(34,197,94,.15);color:#4ade80;border:1px solid var(--green);}.fb{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid var(--blue);}.fc{background:rgba(245,158,11,.15);color:#fbbf24;border:1px solid var(--amber);}.fd{background:rgba(239,68,68,.15);color:#f87171;border:1px solid var(--red);}
.ri{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:.5rem .75rem;margin-bottom:.35rem;font-size:.75rem;display:flex;gap:7px;align-items:flex-start;}
.ric{width:15px;height:15px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;flex-shrink:0;margin-top:1px;}
.rok{background:var(--green);color:#fff;}.rno{background:var(--red);color:#fff;}.rsk{background:var(--muted);color:#fff;}
.dl-row{display:flex;gap:8px;margin-top:.7rem;flex-wrap:wrap;}
.dl-btn{padding:.45rem .85rem;border-radius:7px;border:1px solid var(--border);background:var(--card2);color:var(--text);font-size:.74rem;cursor:pointer;font-weight:600;}
.dl-btn.fire{background:rgba(245,158,11,.15);border-color:var(--amber);color:#fcd34d;}
.rcol{background:#080d1c;border-left:1px solid var(--border);display:flex;flex-direction:column;align-items:center;}
.rocket-scene{width:100%;flex:1;display:flex;align-items:center;justify-content:center;perspective:600px;min-height:380px;position:relative;overflow:hidden;}
.stars{position:absolute;inset:0;overflow:hidden;pointer-events:none;}.star{position:absolute;background:#fff;border-radius:50%;}
.rocket-group{transform-style:preserve-3d;animation:spinY 6s linear infinite;position:relative;}@keyframes spinY{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}
.rpart{position:absolute;transform-style:preserve-3d;transition:opacity .5s,transform .6s;}.rpart.hidden{opacity:.08;transform:translateY(-30px)!important;}
.ant-stick{position:absolute;width:3px;height:22px;background:#aabbcc;border-radius:2px;left:50%;transform:translateX(-50%);top:-22px;}
.ant-ball{position:absolute;width:8px;height:8px;border-radius:50%;background:#ff2200;box-shadow:0 0 6px #ff4400;left:50%;transform:translateX(-50%);top:-28px;}
.nose{width:0;height:0;border-left:28px solid transparent;border-right:28px solid transparent;border-bottom:70px solid #cc3322;position:absolute;left:50%;transform:translateX(-50%);top:-70px;}
.body-cyl{width:56px;height:130px;background:linear-gradient(90deg,#b0c8e8 0%,#d8eaf8 40%,#b0c8e8 100%);border-radius:4px;position:absolute;left:50%;transform:translateX(-50%);}
.window-main{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle,#99ddff,#1a66aa);border:2px solid #60a5fa;position:absolute;left:50%;transform:translateX(-50%);top:28px;}
.window-sm{width:13px;height:13px;border-radius:50%;background:radial-gradient(circle,#77ccff,#1a55aa);border:1.5px solid #60a5fa;position:absolute;left:50%;transform:translateX(-50%);top:60px;}
.wing{position:absolute;width:0;height:0;top:80px;}.wing-l{border-right:36px solid #1a5fb0;border-top:20px solid transparent;border-bottom:36px solid transparent;left:-36px;}.wing-r{border-left:36px solid #1a5fb0;border-top:20px solid transparent;border-bottom:36px solid transparent;right:-36px;}
.engine-body{width:52px;height:28px;background:linear-gradient(180deg,#556677,#334455);border-radius:0 0 6px 6px;position:absolute;left:50%;transform:translateX(-50%);top:130px;}
.nozzle{width:38px;height:18px;background:linear-gradient(180deg,#445566,#223344);border-radius:0 0 8px 8px;position:absolute;left:50%;transform:translateX(-50%);top:154px;}
.flames{position:absolute;left:50%;transform:translateX(-50%);top:170px;display:flex;gap:4px;}
.flame{width:10px;border-radius:50% 50% 20% 20%;animation:fl .4s ease-in-out infinite alternate;}
.f1{height:28px;background:linear-gradient(#ffdd00,#ff6600,transparent);}.f2{height:38px;background:linear-gradient(#ffee44,#ff4400,transparent);animation-delay:.1s;}.f3{height:22px;background:linear-gradient(#ffcc00,#ff8800,transparent);animation-delay:.2s;}.f4{height:32px;background:linear-gradient(#ffee55,#ff5500,transparent);animation-delay:.05s;}.f5{height:20px;background:linear-gradient(#ffdd22,#ff7700,transparent);animation-delay:.15s;}
@keyframes fl{from{transform:scaleY(1) scaleX(1)}to{transform:scaleY(1.18) scaleX(.88)}}
.pad{width:90px;height:10px;background:linear-gradient(#2a4a7a,#1a3055);border-radius:3px;margin-top:10px;}
.pad-legs{display:flex;justify-content:space-between;width:100px;}.pad-leg{width:3px;height:20px;background:#1a3055;border-radius:2px;}
.plist{width:100%;padding:.6rem .8rem;border-top:1px solid var(--border);}.ptitle{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:3px;}
.pchip{display:flex;align-items:center;gap:4px;padding:3px 6px;border-radius:5px;border:1px solid var(--border);font-size:.65rem;color:var(--muted);background:var(--card);transition:all .3s;}.pchip.on{color:#4ade80;border-color:var(--green);background:rgba(34,197,94,.1);}
.pdot{width:5px;height:5px;border-radius:50%;background:var(--muted);flex-shrink:0;}.pchip.on .pdot{background:var(--green);}
.sstrip{display:flex;justify-content:space-between;padding:.45rem .8rem;border-top:1px solid var(--border);font-size:.72rem;}.sstrip span{color:var(--muted);}.sstrip strong{color:var(--text);}
.toast{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:.72rem;font-weight:700;padding:.3rem .9rem;border-radius:99px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:10;}.toast.show{opacity:1;}
.stu-info{font-size:.62rem;color:var(--muted);padding:.3rem .8rem;border-top:1px solid var(--border);text-align:center;width:100%;}
@media(max-width:600px),(display-mode:standalone){.wrap{grid-template-columns:1fr;}.rcol{max-height:220px;}.obtn{min-height:56px;font-size:.9rem;}.nbtn{min-height:52px;}.reg-box{width:95vw;}.reg-box input{min-height:48px;font-size:1rem;}.reg-btn{min-height:52px;font-size:1rem;}}
</style>

<script>
(function(){const s=document.getElementById('stars');for(let i=0;i<60;i++){const d=document.createElement('div');d.className='star';const sz=Math.random()*2+.5;d.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+Math.random()*100+'%;top:'+Math.random()*100+'%;opacity:'+(Math.random()*.8+.2);s.appendChild(d);}})();
const FB='https://parcial-9f9b4-default-rtdb.europe-west1.firebasedatabase.app';
let STU={codigo:'',nombre:'',apellido:''};
function startExam(){const c=document.getElementById('regCodigo').value.trim(),n=document.getElementById('regNombre').value.trim(),a=document.getElementById('regApellido').value.trim();if(!c||!n||!a){document.getElementById('regErr').textContent='Completa todos los campos';return;}STU={codigo:c,nombre:n,apellido:a};document.getElementById('regOverlay').classList.add('hide');document.getElementById('stuInfo').textContent=STU.codigo+' — '+STU.nombre+' '+STU.apellido;initQuiz();}

/* ═══ 15 PREGUNTAS NUEVAS — COHETE C++ ═══ */
const BANK=[
// GET/SET — 3
{tag:"get / set",tc:"t1",text:"Cohete tiene 'float velocidad' privado. ¿Getter válido?",code:'class Cohete {\n    float velocidad;\npublic:\n    ???\n};',opts:['void getVelocidad(){return velocidad;}','float getVelocidad(){return velocidad;}','float velocidad(){return velocidad;}','int getVelocidad(){return velocidad;}'],ok:1,expl:'Getter: nombre getAtributo, mismo tipo (float), sin parámetros, con return.'},
{tag:"get / set",tc:"t1",text:"¿Qué pasa si se llama setCombustible(150) con este setter?",code:'void setCombustible(int c){\n    if(c>=0 && c<=100)\n        combustible = c;\n}',opts:['Asigna 150','No asigna nada; combustible queda igual','Asigna 100','Lanza error'],ok:1,expl:'150 no cumple c<=100. El if es falso, combustible no cambia.'},
{tag:"get / set",tc:"t1",text:"¿Cuántos errores tiene este código?",code:'class Cohete {\n    float empuje;\npublic:\n    float setEmpuje(float e){\n        empuje = e;\n    }\n    void getEmpuje(){\n        return empuje;\n    }\n};',opts:['Ninguno','1: getEmpuje es void pero retorna','2: setter retorna float + getter es void','Solo el setter'],ok:2,expl:'setEmpuje declara float pero no retorna (debe ser void). getEmpuje es void pero usa return (debe ser float). 2 errores.'},

// CONSTRUCTOR VACÍO — 2
{tag:"Constructor vacío",tc:"t2",text:"¿Qué hace este constructor vacío?",code:'Cohete(){\n    altitud=0; combustible=100;\n    for(int i=0;i<4;i++)\n        propulsores[i]=0;\n}',opts:['Error: for no va en constructor','Inicializa altitud, combustible y los 4 propulsores en 0','Solo inicializa altitud','Crea Cohete con valores aleatorios'],ok:1,expl:'El constructor vacío puede usar bucles. Inicializa todos los atributos incluido el arreglo.'},
{tag:"Constructor vacío",tc:"t2",text:"¿Cuál línea invoca el constructor vacío?",code:'class Cohete {\npublic:\n    Cohete();\n    Cohete(float a, int c);\n};',opts:['Cohete c1(0, 100);','Cohete c1;','Cohete c1 = new Cohete();','Cohete c1();'],ok:1,expl:'Sin paréntesis ni argumentos: Cohete c1; invoca el vacío. c1() se confundiría con declaración de función.'},

// CONSTRUCTOR PARÁMETROS — 3
{tag:"Constructor parámetros",tc:"t3",text:"¿Qué imprime con dos constructores?",code:'Cohete c1;\nCohete c2(8000.0, 75);\ncout<<c1.getCombustible()<<" "<<c2.getAltitud();',opts:['0 0','100 8000','75 100','Error'],ok:1,expl:'c1 usa vacío (combustible=100). c2 usa parámetros (altitud=8000). Salida: 100 8000.'},
{tag:"Constructor parámetros",tc:"t3",text:"¿Cómo copiar tanques[4] en el constructor?",code:'Cohete(float a,int c,int t[4]){\n    altitud=a; combustible=c;\n    ???\n}',opts:['tanques=t;','tanques[4]=t[4];','for(int i=0;i<4;i++) tanques[i]=t[i];','memcpy(tanques,t);'],ok:2,expl:'Arreglos NO se asignan con =. Se copia cada elemento con un ciclo for.'},
{tag:"Constructor parámetros",tc:"t3",text:"¿Por qué este constructor es incorrecto?",code:'float Cohete(float alt, int comb){\n    altitud = alt;\n    combustible = comb;\n    return 0.0;\n}',opts:['No puede recibir int','Tiene tipo retorno float; constructores NO llevan tipo','Los nombres son muy largos','Falta this->'],ok:1,expl:'Constructores NUNCA llevan tipo de retorno. float lo convierte en una función normal.'},

// FUNCIONES DE VALOR — 2
{tag:"Función de valor",tc:"t4",text:"¿Qué calcula esta función?",code:'float tiempoOrbita(){\n    float distancia = 2 * 3.14159 * radioOrbita;\n    return distancia / velocidad;\n}',opts:['El radio de la órbita','La velocidad orbital','El tiempo en dar una vuelta completa a la órbita','La distancia recorrida'],ok:2,expl:'Calcula circunferencia (2πr) y divide entre velocidad: tiempo = distancia/velocidad.'},
{tag:"Función de valor",tc:"t4",text:"¿Cuál función retorna el propulsor con más combustible?",code:'int propulsorMax(){\n    int max=tanques[0], idx=0;\n    for(int i=1;i<4;i++)\n        if(tanques[i]>max){\n            max=tanques[i]; idx=i;\n        }\n    return idx;\n}',opts:['Retorna el VALOR máximo de combustible','Retorna el ÍNDICE del propulsor con más combustible','Retorna void','Retorna la suma total'],ok:1,expl:'idx guarda la posición del mayor. return idx devuelve el índice (0-3), no el valor.'},

// MATRICES — 3
{tag:"Matrices",tc:"t5",text:"Cohete registra presión en 6 tanques × 200 muestras. ¿Declaración?",opts:['float presion[6,200];','float presion[6][200];','double presion(6)(200);','float presion[200][6];'],ok:1,expl:'6 tanques (filas) × 200 muestras (columnas): float presion[6][200].'},
{tag:"Matrices",tc:"t5",text:"¿Cómo sumar SOLO las 200 muestras del tanque 4 (idx 3)?",code:'float suma = 0;\nfor(int j=0; j<200; j++)\n    suma += presion[___][j];',opts:['presion[j][3]','presion[3][j]','presion[4][j]','presion[j][j]'],ok:1,expl:'Fila fija=3 (tanque 4), columna variable j: presion[3][j].'},
{tag:"Matrices",tc:"t5",text:"¿Cuántos elementos tiene misiones[12][5]?",code:'int misiones[12][5];\n// 12 meses × 5 tipos',opts:['17','60','55','12'],ok:1,expl:'12 filas × 5 columnas = 60 elementos totales.'},

// ARCHIVOS .h/.cpp — 2
{tag:"Archivos .h",tc:"t6",text:"¿Qué pasa si NO pones include guard en Cohete.h?",opts:['Nada, funciona normal','Si se incluye dos veces, da error de redefinición','El .cpp no compila','Solo afecta al main'],ok:1,expl:'Sin #ifndef/#define/#endif, incluir .h dos veces causa redefinición de la clase → error.'},
{tag:"Archivos .h",tc:"t6",text:"¿Cómo se implementa tiempoOrbita() en Cohete.cpp?",code:'#include "Cohete.h"',opts:['float tiempoOrbita(){...}','float Cohete->tiempoOrbita(){...}','float Cohete::tiempoOrbita(){float d=2*3.14159*radioOrbita;return d/velocidad;}','Cohete.float tiempoOrbita(){...}'],ok:2,expl:'Clase::metodo → float Cohete::tiempoOrbita(). El :: indica pertenencia a la clase Cohete.'},
];

const PARTS=[{id:'p-flames',label:'Llamas',qIdx:0},{id:'p-engine',label:'Motor',qIdx:2},{id:'p-wings',label:'Aletas',qIdx:4},{id:'p-body',label:'Fuselaje',qIdx:7},{id:'p-windows',label:'Ventanas',qIdx:9},{id:'p-nose',label:'Cono',qIdx:11},{id:'p-antenna',label:'Antena',qIdx:13}];
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
let Qs=[],cur=0,answers=[],N=15;
function initQuiz(){Qs=shuffle(BANK);cur=0;answers=new Array(N).fill(null);const pg=document.getElementById('pchips');pg.innerHTML='';PARTS.forEach(p=>{const d=document.createElement('div');d.className='pchip';d.id='chip-'+p.id;d.innerHTML='<div class="pdot"></div><span>'+p.label+'</span>';pg.appendChild(d);});document.getElementById('scorenum').textContent='0/'+N;render();}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function unlockPart(id,lb){const el=document.getElementById(id);if(el)el.classList.remove('hidden');const ch=document.getElementById('chip-'+id);if(ch)ch.classList.add('on');const t=document.getElementById('toast');t.textContent='+ '+lb+' ensamblada';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
function render(){const pct=Math.round(cur/N*100);document.getElementById('pbar').style.width=pct+'%';document.getElementById('ppct').textContent=pct+'%';document.getElementById('plbl').textContent='Pregunta '+(cur+1)+' de '+N;const q=Qs[cur],ans=answers[cur],code=q.code?'<pre>'+esc(q.code)+'</pre>':'';const opts=q.opts.map((o,i)=>{let c='obtn';if(ans!==null){if(i===q.ok)c+=' correct';else if(i===ans)c+=' wrong';}return'<button class="'+c+'" onclick="pick('+i+')" '+(ans!==null?'disabled':'')+'>'+esc(o)+'</button>';}).join('');document.getElementById('qview').innerHTML='<div class="qcard"><div class="qnum">Pregunta '+(cur+1)+'</div><span class="tag '+q.tc+'">'+q.tag+'</span><div class="qtxt">'+q.text+'</div>'+code+'<div class="opts">'+opts+'</div><div class="expl'+(ans!==null?' show':'')+'">'+( ans!==null?q.expl:'')+'</div></div><div class="nav"><button class="nbtn" onclick="go('+(cur-1)+')" '+(cur===0?'disabled':'')+'>← Ant</button><span class="ninfo">'+(cur+1)+'/'+N+'</span>'+(cur<N-1?'<button class="nbtn pri" onclick="go('+(cur+1)+')">Sig →</button>':'<button class="nbtn pri" onclick="showFinal()">Resultado →</button>')+'</div>';}
function pick(i){if(answers[cur]!==null)return;answers[cur]=i;render();const c=answers.filter((a,j)=>a===Qs[j].ok).length;document.getElementById('scorenum').textContent=c+'/'+N;if(i===Qs[cur].ok){const p=PARTS.find(p=>p.qIdx===cur);if(p)unlockPart(p.id,p.label);}}
function go(n){if(n>=0&&n<N){cur=n;render();}}
function showFinal(){const c=answers.filter((a,i)=>a===Qs[i].ok).length,sk=answers.filter(a=>a===null).length,nota=(c/N*5).toFixed(1),pct=Math.round(c/N*100);let bc='fd',bt='Necesitas repasar';if(pct>=90){bc='fa';bt='¡Despegue perfecto!';}else if(pct>=75){bc='fb';bt='Buen vuelo';}else if(pct>=60){bc='fc';bt='En órbita baja';}if(c===N)PARTS.forEach(p=>unlockPart(p.id,p.label));const rev=Qs.map((q,i)=>{const a=answers[i];let ic,cl,st;if(a===null){ic='–';cl='rsk';st='Sin responder';}else if(a===q.ok){ic='✓';cl='rok';st='Correcto';}else{ic='✗';cl='rno';st='Correcta: '+q.opts[q.ok];}return'<div class="ri"><div class="ric '+cl+'">'+ic+'</div><div><b>P'+(i+1)+'.</b> '+q.text.substring(0,50)+'…<br><span style="color:var(--muted);font-size:.7rem">'+st+'</span></div></div>';}).join('');document.getElementById('pbar').style.width='100%';document.getElementById('ppct').textContent='100%';document.getElementById('plbl').textContent='Completado';document.getElementById('qview').style.display='none';document.getElementById('fview').style.display='block';document.getElementById('fview').innerHTML='<div class="qcard"><div class="fnum">'+nota+'/5.0</div><div class="fsub">'+c+' correctas · '+(N-c-sk)+' incorrectas · '+sk+' sin responder — Nota: '+nota+'</div><div style="text-align:center"><span class="fbadge '+bc+'">'+bt+' · '+pct+'%</span></div><div class="dl-row"><button class="dl-btn fire" onclick="saveFirebase()">Guardar Firebase</button><button class="dl-btn" onclick="downloadCSV()">Descargar CSV</button><button class="dl-btn" onclick="restart()">Reintentar</button></div><div style="margin-top:.8rem">'+rev+'</div></div>';saveFirebase();}
function saveFirebase(){const c=answers.filter((a,i)=>a===Qs[i].ok).length,nota=(c/N*5).toFixed(1);fetch(FB+'/examenes_cohete/'+STU.codigo+'_'+Date.now()+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({codigo:STU.codigo,nombre:STU.nombre,apellido:STU.apellido,examen:'Cohete_3D',correctas:c,total:N,nota:parseFloat(nota),fecha:new Date().toISOString(),preguntas:Qs.map((q,i)=>({pregunta:q.text,tema:q.tag,respuesta:answers[i]!==null?q.opts[answers[i]]:'Sin responder',correcto:answers[i]===q.ok}))})}).then(r=>{if(r.ok){const t=document.getElementById('toast');t.textContent='✓ Guardado en Firebase';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}}).catch(e=>console.error(e));}
function downloadCSV(){const c=answers.filter((a,i)=>a===Qs[i].ok).length,nota=(c/N*5).toFixed(1);let csv='Codigo,Nombre,Apellido,Examen,Pregunta,Tema,Respuesta,Correcto,Nota\n';Qs.forEach((q,i)=>{csv+=STU.codigo+','+STU.nombre+','+STU.apellido+',Cohete_3D,"'+q.text.replace(/"/g,"'")+'",'+q.tag+',"'+(answers[i]!==null?q.opts[answers[i]].replace(/,/g,';'):'Sin responder')+'",'+(answers[i]===q.ok?'SI':'NO')+','+nota+'\n';});const b=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}),u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download='examen_cohete_'+STU.codigo+'.csv';a.click();URL.revokeObjectURL(u);}
function restart(){document.getElementById('qview').style.display='block';document.getElementById('fview').style.display='none';document.querySelectorAll('.pchip').forEach(c=>c.classList.remove('on'));document.querySelectorAll('.rpart').forEach(p=>p.classList.add('hidden'));Qs=shuffle(BANK);cur=0;answers=new Array(N).fill(null);document.getElementById('scorenum').textContent='0/'+N;render();}
</script>
</body>
</html>
